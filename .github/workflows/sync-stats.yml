name: Sync Stats from Sheet

on:
  # Weekly — every Sunday 20:00 Vietnam time (13:00 UTC)
  schedule:
    - cron: "0 13 * * 0"
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Sync data from Google Sheet
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python3 scripts/sync_stats.py

      - name: Commit updated data.js
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --cached --quiet; then
            echo "Nothing to commit — data unchanged."
          else
            git commit -m "chore: auto-sync stats from Google Sheet [skip ci]"
            git push
          fi
