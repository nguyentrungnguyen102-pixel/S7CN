name: Auto-update Statistics

on:
  schedule:
    # Chạy mỗi Chủ nhật lúc 18:00 UTC (1:00 SA thứ Hai, giờ Việt Nam +7)
    - cron: '0 18 * * 0'
  workflow_dispatch:
    # Cho phép chạy thủ công qua GitHub Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update statistics from Google Sheets
        run: python3 scripts/update_stats.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add stats.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            WEEK=$(date -u +"%Y-%m-%d")
            git commit -m "Auto-update: thống kê ${WEEK}"
            git push
            echo "Changes pushed."
          fi
